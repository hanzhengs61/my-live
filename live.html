<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>直播间登录/注册 + WebSocket</title>
    <style>
        body {
            font-family: "Segoe UI", Arial;
            background: linear-gradient(135deg, #1e1e2f, #2c2c3f);
            margin: 0;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            width: 1000px;
        }

        /* 登录/注册表单 */
        .auth-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 400px;
        }

        .auth-box h2 {
            text-align: center;
        }

        .auth-box input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 6px;
            border: none;
            background: #2e2e42;
            color: #fff;
        }

        .auth-box button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(45deg, #ff4081, #ff6ec7);
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .auth-box .switch {
            text-align: center;
            margin-top: 15px;
            cursor: pointer;
            color: #ff6ec7;
        }

        /* 直播间样式 */
        .panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #chat {
            height: 300px;
            overflow-y: auto;
            padding: 15px;
            border-radius: 10px;
            background: #161625;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .msg {
            padding: 10px 14px;
            border-radius: 8px;
            max-width: 100%;
            display: block;
            line-height: 1.4;
        }

        .chat {
            background: #2b2b45;
        }

        .join {
            background: #1f5f3f;
        }

        .leave {
            background: #6b1f2b;
        }

        .system {
            background: #8c6d1f;
        }

        .gift {
            background: #7a1f5f;
            font-weight: bold;
        }

        .error {
            background: #7a1f1f;
        }

        .gift-effect {
            position: fixed;
            font-size: 42px;
            font-weight: bold;
            color: #ff6ec7;
            text-shadow: 0 0 15px #ff6ec7;
            animation: giftPop 2s ease forwards;
        }

        @keyframes giftPop {
            0% {
                opacity: 0;
                transform: translateY(50px) scale(0.5);
            }
            30% {
                opacity: 1;
                transform: translateY(0) scale(1.3);
            }
            100% {
                opacity: 0;
                transform: translateY(-200px) scale(1);
            }
        }

        .private {
            background: #e0f7fa;
            border-left: 4px solid #00acc1;
            color: #006064;
        }

        #userList div {
            padding: 8px 12px;
            cursor: pointer;
            border-bottom: 1px solid #444;
            transition: background 0.2s;
        }

        #userList div:hover {
            background: rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>

<div class="container">

    <!-- 注册/登录表单 -->
    <div class="auth-box" id="authBox">
        <h2 id="title">登录</h2>
        <input id="username" placeholder="用户名">
        <input id="password" type="password" placeholder="密码">
        <div id="extraFields" style="display:none;">
            <input id="nickname" placeholder="昵称">
            <input id="email" placeholder="邮箱">
        </div>
        <button onclick="submitForm()">提交</button>
        <div class="switch" onclick="toggleMode()">切换注册 / 登录</div>
    </div>

    <!-- 直播间面板 -->
    <div id="livePanel" style="display:none;">
        <div class="panel">
            房间ID：
            <input id="room" value="1" style="width:80px">
            <button onclick="joinRoom()">加入房间</button>
            <button onclick="leaveRoom()">离开房间</button>
            <br><br>
            <br>
            当前房间： <span id="currentRoom">无</span><br>
            在线用户 (<span id="online">0</span>)
            <div id="userList" style="max-height:400px; overflow-y:auto; font-size:14px;"></div>
        </div>


        <div class="panel">
            <input id="msg" placeholder="输入弹幕..." style="width:500px">
            <button onclick="sendChat()">发送弹幕</button>
            <button onclick="sendGift(1,1)">送礼物</button>
            <button onclick="document.getElementById('giftPanel').style.display='block'">更多礼物</button>
        </div>

        <!-- 礼物面板（可折叠或弹窗） -->
        <div class="panel" id="giftPanel" style="display:none;">
            <h3>选择礼物</h3>
            <div style="display:flex; flex-wrap:wrap; gap:10px;">
                <button onclick="sendGift(1,1)">玫瑰 x1 (10币)</button>
                <button onclick="sendGift(1,10)">玫瑰 x10 (100币)</button>
                <button onclick="sendGift(1,66)">玫瑰 x66 (660币)</button>
                <button onclick="sendGift(2,1)">爱心 x1 (20币)</button>
                <button onclick="sendGift(3,1)">火箭 x1 (300币)</button>
                <button onclick="sendGift(4,1)">跑车 x1 (1314币)</button>
            </div>
            <br>
            <button onclick="document.getElementById('giftPanel').style.display='none'">关闭</button>
        </div>

        <div class="panel">
            <h3>聊天记录</h3>
            <div id="chat"></div>
        </div>

        <div class="panel">
            <h3>私信</h3>
            <input id="privateTarget" placeholder="对方用户 ID" style="width:150px">
            <input id="privateMsg" placeholder="私信内容" style="width:300px">
            <button onclick="sendPrivate()">发送私信</button>
        </div>
    </div>

</div>


<script>
    let isLogin = true;
    let token = "";
    let ws = null;
    let currentRoom = "";

    // 切换登录 / 注册
    function toggleMode() {
        isLogin = !isLogin;
        document.getElementById("title").innerText = isLogin ? "登录" : "注册";
        document.getElementById("extraFields").style.display = isLogin ? "none" : "block";
    }

    // 提交表单
    async function submitForm() {
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();
        if (!username || !password) {
            alert("用户名和密码必填");
            return;
        }

        let url = isLogin ? "http://localhost:8080/api/login" : "http://localhost:8080/api/register";
        let body = {Username: username, Password: password};
        if (!isLogin) {
            const nickname = document.getElementById("nickname").value.trim();
            const email = document.getElementById("email").value.trim();
            if (!nickname || !email) {
                alert("昵称和邮箱必填");
                return;
            }
            body.Nickname = nickname;
            body.Email = email;
        }

        try {
            const res = await fetch(url, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(body)
            });
            const data = await res.json();
            if (!res.ok) {
                alert(data.message || "请求失败");
                return;
            }

            if (data.code === 0 && data.data) {
                token = data.data;  // <- 注意是 data.data 而不是 data.token
                localStorage.setItem("token", token);
                alert(isLogin ? "登录成功" : "注册成功");

                document.getElementById("authBox").style.display = "none";
                document.getElementById("livePanel").style.display = "block";

                connectWS();  // 自动连接 WebSocket
            } else {
                alert(data.message || "登录失败");
            }

            // 显示直播间界面
            document.getElementById("authBox").style.display = "none";
            document.getElementById("livePanel").style.display = "block";

            // 自动连接 WebSocket
            connectWS();

        } catch (err) {
            console.error(err);
            alert("网络错误");
        }
    }

    // WebSocket 连接
    function connectWS() {
        if (!token) {
            token = localStorage.getItem("token");
        }
        if (!token) {
            alert("缺少 token");
            return;
        }

        ws = new WebSocket(`ws://localhost:8080/ws?token=${encodeURIComponent(token)}`);

        ws.onopen = () => {
            log("WebSocket 已连接", "system");
        };
        ws.onmessage = (e) => {
            try {
                const msg = JSON.parse(e.data);
                console.log("收到消息:", msg);
                switch (msg.type) {
                    case "join":
                        log(msg.nickname + " 进入房间", "join");
                        if (msg.room_id) updateRoom(msg.room_id);
                        break;
                    case "leave":
                        log(msg.nickname + " 离开房间", "leave");
                        break;
                    case "chat":
                        log(`<b>${msg.nickname}</b>：${msg.content}`, "chat");
                        break;
                    case "gift":
                        let effectClass = "gift-effect";
                        let emoji = "🎁";
                        if (msg.content.includes("玫瑰")) {
                            effectClass += " rose";
                            emoji = "🌹";
                        } else if (msg.content.includes("爱心")) {
                            effectClass += " heart";
                            emoji = "❤️";
                        } else if (msg.content.includes("火箭")) {
                            effectClass += " rocket";
                            emoji = "🚀";
                        } else if (msg.content.includes("跑车")) {
                            effectClass += " car";
                            emoji = "🏎️";
                        }
                        showGiftEffect(emoji, msg.nickname, msg.content);
                        log(emoji + " " + msg.nickname + msg.content, "gift");
                        break;
                    case "private_chat":
                        log("📩 [私聊] " + msg.nickname + " : " + msg.content, "private");
                        break;
                    case "user_list":
                        document.getElementById("online").innerText = msg.online_count || 0;

                        const userListDiv = document.getElementById("userList");
                        if (!userListDiv) {
                            console.error("找不到 #userList 元素！");
                            break;
                        }

                        userListDiv.innerHTML = "";

                        if (msg.extra && Array.isArray(msg.extra)) {
                            msg.extra.forEach(user => {
                                const div = document.createElement("div");
                                div.style.padding = "10px";
                                div.style.cursor = "pointer";
                                div.style.borderBottom = "1px solid #555";
                                div.innerHTML = `👤 ${user.nickname || user.username || "匿名用户"}`;

                                div.onclick = () => {
                                    const text = prompt(`给 ${user.nickname || user.username} 发送私信：`);
                                    if (text && text.trim()) {
                                        ws.send(JSON.stringify({
                                            type: "private_chat",
                                            room_id: currentRoom,
                                            target_id: user.user_id,
                                            content: text.trim()
                                        }));
                                    }
                                };
                                userListDiv.appendChild(div);
                            });
                        } else {
                            userListDiv.innerHTML = "<div style='color:#888;padding:10px;'>暂无在线用户</div>";
                        }
                        break;
                    case "system":
                        log(msg.content, "system");
                        break;
                    case "error":
                        log("❌ " + msg.content, "error");
                        alert(msg.content);
                        break;
                    default:
                        log("未知消息:" + JSON.stringify(msg), "system");
                }
            } catch (err) {
                console.error(err);
                log("消息解析错误", "error");
            }
        };
        ws.onclose = () => {
            log("WebSocket 连接关闭", "system");
            updateRoom("");
        };
    }

    // UI 辅助
    function log(text, cls) {
        const div = document.createElement("div");
        div.className = "msg " + (cls || "");
        div.innerHTML = text;
        const chat = document.getElementById("chat");
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    function updateRoom(room) {
        currentRoom = room;
        document.getElementById("currentRoom").innerText = room || "无";
    }

    // 聊天
    function sendChat() {
        const text = document.getElementById("msg").value.trim();
        if (!text) {
            return;
        }
        if (!ws || ws.readyState !== WebSocket.OPEN) {
            alert("WebSocket 未连接");
            return;
        }
        if (!currentRoom) {
            alert("请先加入房间");
            return;
        }
        ws.send(JSON.stringify({type: "chat", room_id: currentRoom, content: text}));
        document.getElementById("msg").value = "";
    }

    // 加入 / 离开房间
    function joinRoom() {
        const room = document.getElementById("room").value.trim();
        if (!room) {
            alert("请输入房间ID");
            return;
        }
        if (!ws || ws.readyState !== WebSocket.OPEN) {
            alert("WebSocket 未连接");
            return;
        }
        currentRoom = room;
        document.getElementById("currentRoom").innerText = room;
        ws.send(JSON.stringify({type: "join", room_id: room, content: ""}));
        log("正在加入房间 " + room + "...", "system");
    }

    function leaveRoom() {
        if (!currentRoom) {
            alert("当前不在房间");
            return;
        }
        if (!ws || ws.readyState !== WebSocket.OPEN) {
            return;
        }
        ws.send(JSON.stringify({type: "leave"}));
        log("已发送离开请求", "system");
        updateRoom("");
    }

    // 礼物特效
    let giftMap = {}; // key = sender+gift

    function showGiftEffect(emoji,sender,gift) {
        const eff = document.createElement("div");
        eff.className = "gift-effect";
        eff.innerHTML = `${emoji} ${gift}`;
        eff.style.left = (30 + Math.random() * 40) + "%";
        eff.style.top = (50 + Math.random() * 20) + "%";
        document.body.appendChild(eff);

        // 保持滚动到底部
        document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
    }

    function sendGift(giftID, count) {
        if (!ws || ws.readyState !== WebSocket.OPEN) return alert("WebSocket 未连接");
        if (!currentRoom) return alert("请先加入房间");

        ws.send(JSON.stringify({
            type: "gift",
            room_id: currentRoom,
            gift_id: giftID,
            count: count
        }));
    }

    function sendPrivate() {
        const targetID = document.getElementById("privateTarget").value.trim();
        const text = document.getElementById("privateMsg").value.trim();

        if (!targetID || !text) {
            alert("请输入对方ID和内容");
            return;
        }

        if (!ws || ws.readyState !== WebSocket.OPEN) return alert("WebSocket 未连接");
        if (!currentRoom) return alert("请先加入房间");

        ws.send(JSON.stringify({
            type: "private_chat",
            room_id: currentRoom,
            target_id: parseInt(targetID),
            content: text
        }));
        document.getElementById("privateMsg").value = "";
    }

    window.addEventListener("load", () => {
        const savedToken = localStorage.getItem("token");
        if (savedToken) {
            token = savedToken;
            document.getElementById("authBox").style.display = "none";
            document.getElementById("livePanel").style.display = "block";
            connectWS();
        }
    });

</script>

</body>
</html>
