<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>直播间登录/注册 + WebSocket</title>
    <style>
        body {
            font-family: "Segoe UI", Arial;
            background: linear-gradient(135deg, #1e1e2f, #2c2c3f);
            margin: 0;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            width: 1000px;
        }

        /* 登录/注册表单 */
        .auth-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 400px;
        }

        .auth-box h2 {
            text-align: center;
        }

        .auth-box input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 6px;
            border: none;
            background: #2e2e42;
            color: #fff;
        }

        .auth-box button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(45deg, #ff4081, #ff6ec7);
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .auth-box .switch {
            text-align: center;
            margin-top: 15px;
            cursor: pointer;
            color: #ff6ec7;
        }

        /* 直播间样式 */
        .panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #chat {
            height: 300px;
            overflow-y: auto;
            padding: 15px;
            border-radius: 10px;
            background: #161625;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .msg {
            padding: 10px 14px;
            border-radius: 8px;
            max-width: 100%;
            display: block;
            line-height: 1.4;
        }

        .chat {
            background: #2b2b45;
        }

        .join {
            background: #1f5f3f;
        }

        .leave {
            background: #6b1f2b;
        }

        .system {
            background: #8c6d1f;
        }

        .gift {
            background: #7a1f5f;
            font-weight: bold;
        }

        .error {
            background: #7a1f1f;
        }

        .gift-effect {
            position: fixed;
            font-size: 42px;
            font-weight: bold;
            color: #ff6ec7;
            text-shadow: 0 0 15px #ff6ec7;
            animation: giftPop 2s ease forwards;
        }

        @keyframes giftPop {
            0% {
                opacity: 0;
                transform: translateY(50px) scale(0.5);
            }
            30% {
                opacity: 1;
                transform: translateY(0) scale(1.3);
            }
            100% {
                opacity: 0;
                transform: translateY(-200px) scale(1);
            }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- 注册/登录表单 -->
    <div class="auth-box" id="authBox">
        <h2 id="title">登录</h2>
        <input id="username" placeholder="用户名">
        <input id="password" type="password" placeholder="密码">
        <div id="extraFields" style="display:none;">
            <input id="nickname" placeholder="昵称">
            <input id="email" placeholder="邮箱">
        </div>
        <button onclick="submitForm()">提交</button>
        <div class="switch" onclick="toggleMode()">切换注册 / 登录</div>
    </div>

    <!-- 直播间面板 -->
    <div id="livePanel" style="display:none;">
        <div class="panel">
            房间ID：
            <input id="room" value="1" style="width:80px">
            <button onclick="joinRoom()">加入房间</button>
            <button onclick="leaveRoom()">离开房间</button>
            <br><br>
            在线人数： <span id="online">0</span>
            <br>
            当前房间： <span id="currentRoom">无</span>
        </div>

        <div class="panel">
            <input id="msg" placeholder="输入弹幕..." style="width:500px">
            <button onclick="sendChat()">发送弹幕</button>
            <button onclick="sendGift()">送礼物</button>
        </div>

        <div class="panel">
            <h3>聊天记录</h3>
            <div id="chat"></div>
        </div>
    </div>

</div>


<script>
    let isLogin = true;
    let token = "";
    let ws = null;
    let currentRoom = "";

    // 切换登录 / 注册
    function toggleMode() {
        isLogin = !isLogin;
        document.getElementById("title").innerText = isLogin ? "登录" : "注册";
        document.getElementById("extraFields").style.display = isLogin ? "none" : "block";
    }

    // 提交表单
    async function submitForm() {
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();
        if (!username || !password) {
            alert("用户名和密码必填");
            return;
        }

        let url = isLogin ? "http://localhost:8080/api/login" : "http://localhost:8080/api/register";
        let body = {Username: username, Password: password};
        if (!isLogin) {
            const nickname = document.getElementById("nickname").value.trim();
            const email = document.getElementById("email").value.trim();
            if (!nickname || !email) {
                alert("昵称和邮箱必填");
                return;
            }
            body.Nickname = nickname;
            body.Email = email;
        }

        try {
            const res = await fetch(url, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(body)
            });
            const data = await res.json();
            if (!res.ok) {
                alert(data.message || "请求失败");
                return;
            }

            if(data.code === 0 && data.data){
                token = data.data;  // <- 注意是 data.data 而不是 data.token
                localStorage.setItem("token", token);
                alert(isLogin ? "登录成功" : "注册成功");

                document.getElementById("authBox").style.display = "none";
                document.getElementById("livePanel").style.display = "block";

                connectWS();  // 自动连接 WebSocket
            }else{
                alert(data.message || "登录失败");
            }

            // 显示直播间界面
            document.getElementById("authBox").style.display = "none";
            document.getElementById("livePanel").style.display = "block";

            // 自动连接 WebSocket
            connectWS();

        } catch (err) {
            console.error(err);
            alert("网络错误");
        }
    }

    // WebSocket 连接
    function connectWS() {
        if (!token) {
            token = localStorage.getItem("token");
        }
        if (!token) {
            alert("缺少 token");
            return;
        }

        ws = new WebSocket(`ws://localhost:8080/ws?token=${encodeURIComponent(token)}`);

        ws.onopen = () => {
            log("WebSocket 已连接", "system");
        };
        ws.onmessage = (e) => {
            try {
                const msg = JSON.parse(e.data);
                switch (msg.type) {
                    case "join":
                        log(msg.nickname + " 进入房间", "join");
                        if (msg.room_id) updateRoom(msg.room_id);
                        break;
                    case "leave":
                        log(msg.nickname + " 离开房间", "leave");
                        break;
                    case "chat":
                        log(`<b>${msg.nickname}</b>：${msg.content}`, "chat");
                        break;
                    case "gift":
                        log(`🎁 ${msg.nickname} 送出 ${msg.content}`, "gift");
                        console.log("收到:", msg.nickname)
                        showGiftEffect(msg.nickname, msg.content);
                        break;
                    case "online":
                        document.getElementById("online").innerText = msg.online_count;
                        break;
                    case "system":
                        log(msg.content, "system");
                        break;
                    case "error":
                        log("❌ " + msg.content, "error");
                        alert(msg.content);
                        break;
                    default:
                        log("未知消息:" + JSON.stringify(msg), "system");
                }
            } catch (err) {
                console.error(err);
                log("消息解析错误", "error");
            }
        };
        ws.onclose = () => {
            log("WebSocket 连接关闭", "system");
            updateRoom("");
        };
    }

    // UI 辅助
    function log(text, cls) {
        const div = document.createElement("div");
        div.className = "msg " + (cls || "");
        div.innerHTML = text;
        const chat = document.getElementById("chat");
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    function updateRoom(room) {
        currentRoom = room;
        document.getElementById("currentRoom").innerText = room || "无";
    }

    // 聊天
    function sendChat() {
        const text = document.getElementById("msg").value.trim();
        if (!text) {
            return;
        }
        if (!ws || ws.readyState !== WebSocket.OPEN) {
            alert("WebSocket 未连接");
            return;
        }
        if (!currentRoom) {
            alert("请先加入房间");
            return;
        }
        ws.send(JSON.stringify({type: "chat", room_id: currentRoom, content: text}));
        document.getElementById("msg").value = "";
    }

    // 加入 / 离开房间
    function joinRoom() {
        const room = document.getElementById("room").value.trim();
        if (!room) {
            alert("请输入房间ID");
            return;
        }
        if (!ws || ws.readyState !== WebSocket.OPEN) {
            alert("WebSocket 未连接");
            return;
        }
        currentRoom = room;
        document.getElementById("currentRoom").innerText = room;
        ws.send(JSON.stringify({type: "join", room_id: room, content: ""}));
        log("正在加入房间 " + room + "...", "system");
    }

    function leaveRoom() {
        if (!currentRoom) {
            alert("当前不在房间");
            return;
        }
        if (!ws || ws.readyState !== WebSocket.OPEN) {
            return;
        }
        ws.send(JSON.stringify({type: "leave"}));
        log("已发送离开请求", "system");
        updateRoom("");
    }

    // 礼物特效
    let giftMap = {}; // key = sender+gift

    function showGiftEffect(sender, gift) {
        // 使用 sender + gift 作为唯一标识，确保合并
        const key = sender + "_" + gift;

        // 调试：查看 key 是什么，方便排查为什么没匹配到
        console.log("当前 key:", key, "giftMap是否存在:", !!giftMap[key]);

        if (giftMap[key]) {
            // -&#45;&#45; 情况 A：匹配到已有记录，更新数字 -&#45;&#45;
            giftMap[key].count++;
            // 核心：更新同一个 DOM 元素
            giftMap[key].elem.innerHTML = `🎁 ${sender} 送出 ${gift} ×${giftMap[key].count}`;

            // 重置计时器，防止记录过早消失
            clearTimeout(giftMap[key].timer);
            startAutoRemoveTimer(key);
        } else {
            // -&#45;&#45; 情况 B：没有匹配到，创建新行 -&#45;&#45;
            const chat = document.getElementById("chat");
            const div = document.createElement("div");
            div.className = "msg gift";
            div.innerHTML = `🎁 ${sender} 送出 ${gift} ×1`;
            chat.appendChild(div);

            giftMap[key] = {
                count: 1,
                elem: div,
                timer: null
            };

            startAutoRemoveTimer(key);
        }

        // 保持滚动到底部
        document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
    }

    function startAutoRemoveTimer(key) {
        if (giftMap[key].timer) clearTimeout(giftMap[key].timer);

        giftMap[key].timer = setTimeout(() => {
            if (giftMap[key] && giftMap[key].elem) {
                giftMap[key].elem.remove();
            }
            delete giftMap[key]; // 清理状态
        }, 3000); // 3秒后消失
    }

    // 礼物发送
    let giftQueue = [];
    let sending = false;

    function sendGift() {
        giftQueue.push(1);
        processGiftQueue();
    }

    function processGiftQueue() {
        if (sending) return;
        if (giftQueue.length === 0) return;
        sending = true;
        giftQueue.shift();
        if (!ws || ws.readyState !== WebSocket.OPEN || !currentRoom) {
            sending = false;
            return;
        }
        ws.send(JSON.stringify({type: "gift", room_id: currentRoom, gift_id: 1, count: 1}));
        setTimeout(() => {
            sending = false;
            processGiftQueue();
        }, 300);
    }

    window.addEventListener("load", ()=>{
        const savedToken = localStorage.getItem("token");
        if(savedToken){
            token = savedToken;
            document.getElementById("authBox").style.display="none";
            document.getElementById("livePanel").style.display="block";
            connectWS();
        }
    });

</script>

</body>
</html>
