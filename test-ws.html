<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>直播间测试</title>

    <style>

        body{
            font-family: Arial;
            background:#f5f5f5;
        }

        .container{
            width:800px;
            margin:auto;
        }

        .panel{
            background:white;
            padding:15px;
            margin:15px 0;
            border-radius:8px;
        }

        #chat{
            height:400px;
            overflow-y:auto;
            border:1px solid #ddd;
            padding:10px;
        }

        .msg{
            margin:6px 0;
        }

        .join{color:green}
        .leave{color:red}
        .system{color:#888}
        .chat{color:#222}
        .gift{color:#ff4081}

    </style>
</head>


<body>

<div class="container">

    <h2>直播间 WebSocket 测试</h2>

    <div class="panel">

        Token：
        <input id="token" style="width:400px">

        <button onclick="connect()">连接</button>

        <div id="status">未连接</div>

    </div>


    <div class="panel">

        房间ID：
        <input id="room" value="1">

        <button onclick="joinRoom()">加入房间</button>
        <button onclick="leaveRoom()">离开房间</button>

        <br><br>

        在线人数：
        <span id="online">0</span>

    </div>


    <div class="panel">

        <input id="msg" style="width:400px">

        <button onclick="sendChat()">发送弹幕</button>
        <button onclick="sendGift()">送礼物</button>

    </div>


    <div class="panel">

        <h3>聊天记录</h3>

        <div id="chat"></div>

    </div>

</div>


<script>

    let ws = null
    let currentRoom = ""


    function log(text,cls){

        const div=document.createElement("div")

        div.className="msg "+(cls||"")

        div.innerHTML=text

        document.getElementById("chat").appendChild(div)

        div.scrollIntoView()

    }



    function connect(){

        const token=document.getElementById("token").value

        ws=new WebSocket(`ws://localhost:8080/ws?token=${token}`)

        ws.onopen=()=>{
            document.getElementById("status").innerText="已连接"
            log("WebSocket连接成功","system")
        }


        ws.onmessage=(e)=>{

            const msg=JSON.parse(e.data)

            console.log(msg)

            switch(msg.type){

                case "join":

                    log(msg.nickname+" 进入房间","join")

                    break


                case "leave":

                    log(msg.nickname+" 离开房间","leave")

                    break


                case "chat":

                    log(msg.nickname+" : "+msg.content,"chat")

                    break


                case "gift":

                    log("🎁 "+msg.nickname+" 送出 "+msg.content,"gift")

                    break


                case "online":

                    document.getElementById("online").innerText=msg.online_count

                    break


                case "system":

                    log(msg.content,"system")

                    break
            }

        }


        ws.onclose=()=>{
            document.getElementById("status").innerText="连接关闭"
        }

    }



    function joinRoom(){

        const room=document.getElementById("room").value

        currentRoom=room

        ws.send(JSON.stringify({

            type:"join",
            room_id:room,
            content:""

        }))

    }



    function leaveRoom(){

        ws.send(JSON.stringify({

            type:"leave"

        }))

    }



    function sendChat(){

        const text=document.getElementById("msg").value

        ws.send(JSON.stringify({

            type:"chat",
            room_id:currentRoom,
            content:text

        }))

    }



    function sendGift(){

        ws.send(JSON.stringify({

            type:"gift",
            room_id:currentRoom,
            content:"玫瑰"

        }))

    }

</script>

</body>
</html>
