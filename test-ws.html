<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>直播WebSocket测试 - 第3阶段（实时在线人数）</title>
</head>
<body>
<h2>直播实时消息测试（房间 + 实时在线人数）</h2>
<p>房间ID：<input id="room" value="room001" style="width:150px;">
    用户ID：<input id="uid" value="1001" style="width:80px;">
    昵称：<input id="nick" value="张三">
    <span id="onlineCount" style="color:green;font-weight:bold;">当前在线: 0 人</span>
</p>

<input id="msg" type="text" placeholder="输入弹幕" style="width:300px;">
<button onclick="joinRoom()">加入房间</button>
<button onclick="sendChat()">发送弹幕</button>
<hr>
<div id="output" style="border:1px solid #ccc; padding:10px; height:500px; overflow-y:scroll;"></div>

<script>
    let ws = null;
    let currentRoom = "";

    function connect() {
        if (ws) ws.close();
        ws = new WebSocket("ws://localhost:8080/ws");

        ws.onopen = () => {
            console.log("✅ 连接成功");
            addMessage("系统：WebSocket已连接");
            joinRoom();
        };

        ws.onmessage = (e) => {
            const msg = JSON.parse(e.data);
            if (msg.type === "online") {
                document.getElementById("onlineCount").textContent = `当前在线: ${msg.online_count} 人`;
            } else {
                addMessage(`[${msg.room_id}] ${msg.nickname}: ${msg.content}`);
            }
        };

        ws.onclose = () => addMessage("系统：连接断开");
    }

    function joinRoom() {
        const room = document.getElementById("room").value;
        const uid = parseInt(document.getElementById("uid").value);
        const nick = document.getElementById("nick").value;
        currentRoom = room;

        const joinMsg = { type: "join", room_id: room, user_id: uid, nickname: nick };
        ws.send(JSON.stringify(joinMsg));
        addMessage("系统：已加入房间 " + room);
    }

    function sendChat() {
        const content = document.getElementById("msg").value;
        if (!content || !currentRoom) return;

        const chatMsg = { type: "chat", room_id: currentRoom, user_id: parseInt(document.getElementById("uid").value), nickname: document.getElementById("nick").value, content: content };
        ws.send(JSON.stringify(chatMsg));
        addMessage("我发送: " + content);
        document.getElementById("msg").value = "";
    }

    function addMessage(text) {
        const div = document.getElementById("output");
        div.innerHTML += "<p>" + text + "</p>";
        div.scrollTop = div.scrollHeight;
    }

    connect();
    document.getElementById("msg").addEventListener("keypress", e => { if (e.key === "Enter") sendChat(); });
</script>
</body>
</html>
