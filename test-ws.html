<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>直播WebSocket测试 - 第2阶段（房间+心跳+JSON）</title>
</head>
<body>
<h2>直播实时消息测试（按房间广播）</h2>
<p>房间ID：<input id="room" value="room001" style="width:150px;">
    用户ID：<input id="uid" value="1003" style="width:80px;">
    昵称：<input id="nick" value="范德彪"></p>

<input id="msg" type="text" placeholder="输入弹幕" style="width:300px;">
<button onclick="joinRoom()">加入房间</button>
<button onclick="sendChat()">发送弹幕</button>
<hr>
<div id="output" style="border:1px solid #ccc; padding:10px; height:500px; overflow-y:scroll;"></div>

<script>
    let ws = null;
    let currentRoom = "";

    function connect() {
        if (ws) ws.close();
        ws = new WebSocket("ws://localhost:8080/ws");

        ws.onopen = () => {
            console.log("✅ 连接成功");
            addMessage("系统：WebSocket已连接");
            joinRoom(); // 自动加入房间
        };

        ws.onmessage = (e) => {
            const msg = JSON.parse(e.data);
            addMessage(`[${msg.room_id}] ${msg.nickname}: ${msg.content} (type:${msg.type})`);
        };

        ws.onclose = () => addMessage("系统：连接断开");
    }

    function joinRoom() {
        const room = document.getElementById("room").value;
        const uid = parseInt(document.getElementById("uid").value);
        const nick = document.getElementById("nick").value;
        currentRoom = room;

        const joinMsg = {
            type: "join",
            room_id: room,
            user_id: uid,
            nickname: nick,
            content: ""
        };
        ws.send(JSON.stringify(joinMsg));
        addMessage("系统：已申请加入房间 " + room);
    }

    function sendChat() {
        const content = document.getElementById("msg").value;
        if (!content || !currentRoom) return;

        const chatMsg = {
            type: "chat",
            room_id: currentRoom,
            user_id: parseInt(document.getElementById("uid").value),
            nickname: document.getElementById("nick").value,
            content: content
        };
        ws.send(JSON.stringify(chatMsg));
        document.getElementById("msg").value = "";
    }

    function addMessage(text) {
        const div = document.getElementById("output");
        div.innerHTML += "<p>" + text + "</p>";
        div.scrollTop = div.scrollHeight;
    }

    // 启动连接
    connect();

    // 回车发送
    document.getElementById("msg").addEventListener("keypress", e => {
        if (e.key === "Enter") sendChat();
    });
</script>
</body>
</html>
